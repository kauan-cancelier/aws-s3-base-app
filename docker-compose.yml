version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: baseapp-postgres
    restart: always
    environment:
      POSTGRES_USER: baseappuser
      POSTGRES_PASSWORD: basepass
      POSTGRES_DB: basedb
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: