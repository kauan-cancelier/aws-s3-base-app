spring:
  application:
    name: java-aws-s3-base-app

  datasource:
    url: jdbc:postgresql://localhost:5435/basedb
    username: baseappuser
    password: basepass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/base-app-realm

server:
  port: 8100

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace


keycloak:
  auth-server-url: http://localhost:8081/realms/base-app-realm
  admin-server-url: http://localhost:8081/admin/realms/base-app-realm
  master-server-url: http://localhost:8081/realms/master
  client-id: base-app-realm
  client-secret: NFTIiTo6RB0Q892xg5nmtPehFRxW7iQr
  admin-username: admin
  admin-password: admin